http:
  # ============================================
  # Routers
  # ============================================
  routers:
    # API Router - HTTP
    api-http:
      rule: "PathPrefix(`/api/v1`)"
      service: api
      entrypoints:
        - web
      middlewares:
        - strip-prefix
        - compress
        - rate-limit
        - cors
        - security-headers

    # Auth Router - HTTP
    auth-http:
      rule: "PathPrefix(`/auth`)"
      service: auth
      entrypoints:
        - web
      middlewares:
        - cors

    # Redirect HTTP to HTTPS
    https-redirect:
      rule: "HostRegexp(`{host:.+}`)"
      service: https-redirect
      entrypoints:
        - web

    # Dashboard HTTP
    dashboard-http:
      rule: "Host(`traefik.localhost`)"
      service: api@internal
      entrypoints:
        - web

    # API Router - HTTPS
    api-https:
      rule: "PathPrefix(`/api/v1`)"
      service: api
      entrypoints:
        - websecure
      tls:
        certResolver: letsencrypt
        domains:
          - main: "localhost"
            sans:
              - "*.localhost"
      middlewares:
        - strip-prefix
        - compress
        - rate-limit
        - cors
        - security-headers

    # Auth Router - HTTPS
    auth-https:
      rule: "PathPrefix(`/auth`)"
      service: auth
      entrypoints:
        - websecure
      tls:
        certResolver: letsencrypt
      middlewares:
        - cors

    # Dashboard HTTPS
    dashboard-https:
      rule: "Host(`traefik.localhost`)"
      service: api@internal
      entrypoints:
        - websecure
      tls:
        certResolver: letsencrypt

  # ============================================
  # Services
  # ============================================
  services:
    # Main API Service
    api:
      loadBalancer:
        servers:
          - url: "http://api:8080"
        healthCheck:
          path: /health
          interval: 10s
          timeout: 3s
          hostname: api
        responseForwarding:
          flushInterval: 100ms
        circuitBreaker:
          expression: "NetworkErrorRatio() > 0.30"
        retries: 3

    # Auth Service
    auth:
      loadBalancer:
        servers:
          - url: "http://auth:8080"
        healthCheck:
          path: /auth/health
          interval: 10s
          timeout: 3s
          hostname: auth
        responseForwarding:
          flushInterval: 100ms
        circuitBreaker:
          expression: "NetworkErrorRatio() > 0.30"

    # HTTPS redirect service
    https-redirect:
      loadBalancer:
        servers:
          - url: "https://localhost:443"

  # ============================================
  # Middlewares
  # ============================================
  middlewares:
    # Strip /api/v1 prefix
    strip-prefix:
      stripPrefix:
        prefixes:
          - "/api/v1"
        forceSlash: false

    # Gzip compression
    compress:
      compress:
        excludedContentTypes:
          - "application/grpc"
        minResponseBodyBytes: 100
        defaultEncoding: gzip

    # Rate limiting
    rate-limit:
      rateLimit:
        average: 100
        burst: 50
        period: 1s
        averageByIp: true

    # Retry
    retry:
      retry:
        attempts: 3
        initialInterval: 100ms
        maxInterval: 500ms
        maxElapsedTime: 10s

    # Circuit breaker
    circuit-breaker:
      circuitBreaker:
        expression: "NetworkErrorRatio() > 0.30"
        baseDuration: 5s
        recoveryDuration: 10s

    # Security headers
    security-headers:
      headers:
        frameDeny: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "strict-origin-when-cross-origin"
        forceSTSHeader: true
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        customResponseHeaders:
          X-Content-Type-Options: "nosniff"
          X-Frame-Options: "DENY"
          X-XSS-Protection: "1; mode=block"
          Strict-Transport-Security: "max-age=31536000; includeSubDomains; preload"

    # CORS
    cors:
      headers:
        accessControlAllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - PATCH
          - OPTIONS
          - HEAD
        accessControlAllowOriginList:
          - "*"
          - "http://localhost:3000"
        accessControlAllowHeaders:
          - "*"
        accessControlExposeHeaders:
          - "X-Request-ID"
          - "X-Response-Time"
        accessControlMaxAge: 86400
        addVaryHeader: true
        accessControlAllowCredentials: true

    # Forward auth to auth service (for protected routes)
    auth-forward:
      forwardAuth:
        address: "http://auth:8080/auth/validate"
        trustForwardHeader: true
        authResponseHeaders:
          - "X-User-Id"
          - "X-User-Email"
          - "X-User-Role"
