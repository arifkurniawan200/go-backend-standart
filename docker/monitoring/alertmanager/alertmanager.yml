global:
  resolve_timeout: 5m
  smtp_smarthost: 'localhost:25'
  smtp_from: 'alertmanager@example.com'

route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'null'
  routes:
    - match:
        severity: critical
      receiver: 'null'

receivers:
  - name: 'null'
    webhook_configs: []
