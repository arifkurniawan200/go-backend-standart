global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'go-backend'
    environment: 'development'

scrape_configs:
  # Traefik metrics
  - job_name: 'traefik'
    static_configs:
      - targets:
          - 'traefik:8080'
    metrics_path: /metrics
    scheme: http

  # Go API metrics (if exposed)
  - job_name: 'go-api'
    static_configs:
      - targets:
          - 'api:8080'
    metrics_path: /metrics
    scheme: http

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets:
          - 'localhost:9090'

  # Alertmanager (if configured)
  - job_name: 'alertmanager'
    static_configs:
      - targets:
          - 'alertmanager:9093'
